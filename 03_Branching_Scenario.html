  .header {
    text-align: center;
    margin-bottom: 32px;

    animation: fadeUp 0.8s ease forwards;

    font-size: 11px;

    padding: 4px 14px;

    color: var(--text-dim);

    font-weight: 300;

    opacity: 0;
    animation: fadeUp 0.6s ease forwards;
    position: relative;
    overflow: hidden;
    box-shadow: 0 4px 24px rgba(26,155,168,0.10);

    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    border-radius: 16px 16px 0 0;
  }

  .scene.end-warn::before { background: var(--warn); }
  .scene.end-bad::before { background: var(--danger); }
  .scene.end-final::before { background: linear-gradient(90deg, var(--accent), var(--accent2)); }

  .scene-label {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 20px;
  }

  .scene-label .icon {
    font-size: 18px;
  }

    letter-spacing: 1.5px;

    line-height: 1.8;
    font-weight: 300;
    color: var(--text);
    white-space: pre-line;

  .scene-text strong {
    font-weight: 600;
    color: var(--accent);
  }

    font-style: italic;
    color: var(--text-dim);

    font-weight: 600;
    color: var(--text-dim);

    padding: 14px 20px;
    color: var(--text);

    font-weight: 400;

    align-items: center;

    background: rgba(26,155,168,0.08);
    border-color: var(--accent);
    color: var(--accent2);
    transform: translateX(4px);

    min-width: 28px;
    height: 28px;
    background: rgba(26,155,168,0.12);
    border: 1px solid rgba(26,155,168,0.3);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    color: var(--accent);

    border: 1px solid rgba(26,155,168,0.25);
    border-radius: 10px;

    font-size: 15px;
    line-height: 1.7;
    color: #334155;
    font-style: italic;

    margin-top: 28px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }

  .btn-restart {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 20px;
    color: var(--text-dim);
    font-family: 'Source Sans 3', sans-serif;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-restart:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .btn-next {
    background: var(--accent);
    border: none;
    border-radius: 8px;
    padding: 12px 24px;
    color: #ffffff;
    font-family: 'Source Sans 3', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;

    background: var(--accent2);

    font-size: 40px;
    text-align: center;
    margin-bottom: 16px;

    display: flex;
    gap: 6px;
    margin-bottom: 20px;
    flex-wrap: wrap;

  .path-step {
    font-size: 11px;
    padding: 3px 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--text-dim);

    background: rgba(26,155,168,0.12);
    border-color: rgba(26,155,168,0.35);
    color: var(--accent);

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 600px) {
    .scene { padding: 24px 20px; }
    .letter-box { padding: 18px 20px; }

</style>
</head>

<em>Lasst Euch nicht Eurer menschlichen Potenziale berauben.</em>`,
    isFinal: true
  }
};

let pathHistory = [];

function renderScene(sceneId) {
  const scene = scenes[sceneId];
  if (!scene) return;

  pathHistory.push(sceneId);

  document.getElementById('progress').style.width = scene.progress + '%';

  const container = document.getElementById('scene-container');
  container.innerHTML = '';

  const div = document.createElement('div');
  div.className = `scene ${scene.type || ''}`;

  // Path tracker
  if (pathHistory.length > 1) {
    const tracker = document.createElement('div');
    tracker.className = 'path-tracker';
    pathHistory.forEach((id, i) => {
      const step = document.createElement('div');
      step.className = 'path-step' + (i === pathHistory.length - 1 ? ' active' : '');
      step.textContent = scenes[id]?.title?.split('—')[0].trim() || id;
      tracker.appendChild(step);
    });
    div.appendChild(tracker);
  }

  // Label
  const label = document.createElement('div');
  label.className = 'scene-label';
  label.innerHTML = `<span class="icon">${scene.icon}</span><span class="title">${scene.title}</span>`;
  if (scene.badge) {
    label.innerHTML += `<span class="status-badge ${scene.badge.cls}">${scene.badge.text}</span>`;
  }
  div.appendChild(label);

  // Outcome icon
  if (scene.outcomeIcon && scene.type !== 'normal') {
    const oi = document.createElement('div');
    oi.className = 'outcome-icon';
    oi.textContent = scene.outcomeIcon;
    div.appendChild(oi);
  }

  // Content
  const text = document.createElement('div');
  text.className = 'scene-text';
  text.innerHTML = scene.content.replace(/\n/g, '<br>');
  div.appendChild(text);

  // Choices
  if (scene.choices) {
    const q = document.createElement('div');
    q.className = 'question';

    // Timer bar — only for scenes with choices
    const timerWrap = document.createElement('div');
    timerWrap.style.cssText = 'margin-bottom:14px;';
    const timerLabel = document.createElement('div');
    timerLabel.style.cssText = 'font-size:12px; color:var(--text-dim); margin-bottom:6px; display:flex; justify-content:space-between;';
    timerLabel.innerHTML = '<span>⏳ Bitte erst lesen...</span><span id="timer-count">15</span>';
    const timerTrack = document.createElement('div');
    timerTrack.style.cssText = 'height:4px; background:var(--border); border-radius:2px; overflow:hidden;';
    const timerFill = document.createElement('div');
    timerFill.id = 'timer-fill';
    timerFill.style.cssText = 'height:100%; width:100%; background:var(--accent); border-radius:2px; transition:width 1s linear;';
    timerTrack.appendChild(timerFill);
    timerWrap.appendChild(timerLabel);
    timerWrap.appendChild(timerTrack);
    q.appendChild(timerWrap);

    q.innerHTML += `<p>${scene.question}</p>`;
    const choices = document.createElement('div');
    choices.className = 'choices';
    const btns = [];
    scene.choices.forEach(choice => {
      const btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.innerHTML = `<span class="choice-letter">${choice.letter}</span>${choice.text}`;
      btn.disabled = true;
      btn.style.opacity = '0.4';
      btn.style.cursor = 'not-allowed';
      btn.onclick = () => {
        btn.style.opacity = '0.5';
        btn.style.pointerEvents = 'none';
        setTimeout(() => renderScene(choice.next), 300);
      };
      choices.appendChild(btn);
      btns.push(btn);
    });
    q.appendChild(choices);
    div.appendChild(q);

    // Start countdown after render
    let secs = 15;
    const interval = setInterval(() => {
      secs--;
      const countEl = document.getElementById('timer-count');
      const fillEl = document.getElementById('timer-fill');
      if (countEl) countEl.textContent = secs;
      if (fillEl) fillEl.style.width = (secs / 15 * 100) + '%';
      if (secs <= 0) {
        clearInterval(interval);
        btns.forEach(b => {
          b.disabled = false;
          b.style.opacity = '1';
          b.style.cursor = 'pointer';
        });
        if (timerLabel) timerLabel.innerHTML = '<span style="color:var(--success)">✅ Jetzt kannst du wählen</span>';
        if (timerTrack) timerTrack.style.display = 'none';
      }
    }, 1000);
  }

  // Reflection
  if (scene.reflection) {
    const ref = document.createElement('div');
    ref.className = 'reflection';
    ref.innerHTML = `<div class="ref-label">💬 Reflexionsfrage</div><p>${scene.reflection}</p>`;
    div.appendChild(ref);
  }

  // End actions
  if (scene.choices === undefined) {
    const actions = document.createElement('div');
    actions.className = 'end-actions';

    const restart = document.createElement('button');
    restart.className = 'btn-restart';
    restart.textContent = '↩ Nochmal versuchen';
    restart.onclick = () => {
      pathHistory = [];
      renderScene('start');
    };
    actions.appendChild(restart);

    if (!scene.isFinal) {
      const next = document.createElement('button');
      next.className = 'btn-next';
      next.textContent = 'Weiter → Brief nochmal lesen';
      next.onclick = () => renderScene('final');
      actions.appendChild(next);
    }

    div.appendChild(actions);
  }

  container.appendChild(div);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

renderScene('start');
</script>
</body>
</html>
